<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#1a56c4"/>

  <!-- bar chart bars -->
  <rect x="82" y="260" width="72" height="150" rx="10" fill="white" opacity="0.35"/>
  <rect x="178" y="200" width="72" height="210" rx="10" fill="white" opacity="0.55"/>
  <rect x="274" y="150" width="72" height="260" rx="10" fill="white" opacity="0.75"/>
  <rect x="370" y="100" width="72" height="310" rx="10" fill="white"/>

  <!-- trend line over bars -->
  <polyline points="118,250 214,185 310,135 406,88" fill="none" stroke="#7dd3fc" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="406" cy="88" r="14" fill="#7dd3fc"/>

  <!-- peso sign -->
  <text x="104" y="108" font-family="Arial Black,Arial,sans-serif" font-size="88" font-weight="900" fill="white" opacity="0.95">$</text>
</svg>
