<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- background -->
  <rect width="512" height="512" rx="110" fill="#1a56c4"/>

  <!-- 3 bold bars (simpler, bigger, more visible at small sizes) -->
  <rect x="90"  y="310" width="90" height="140" rx="14" fill="white" opacity="0.35"/>
  <rect x="211" y="220" width="90" height="230" rx="14" fill="white" opacity="0.60"/>
  <rect x="332" y="130" width="90" height="320" rx="14" fill="white" opacity="0.90"/>

  <!-- peso sign — large, centered top-left, bold -->
  <text x="68" y="220" font-family="Arial Black,Arial,sans-serif" font-size="200" font-weight="900" fill="white">$</text>
</svg>
